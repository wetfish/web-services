server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://144.48.106.242:3100/loki/api/v1/push

scrape_configs:
  - job_name: traefik-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: traefik-access
          environment: staging
          project: web-services
          __path__: /var/log/traefik/access.log
    pipeline_stages:
      - json:
          expressions:
            router: RouterName
            service: ServiceName
            status: DownstreamStatus
            method: RequestMethod
            path: RequestPath
            host: RequestHost
            duration_ms: Duration
            client_ip: ClientHost
      - labels:
          router:
          service:
          status:
          method:
      - label_keep:
          - job
          - environment
          - project
          - router
          - service
          - status
          - method
